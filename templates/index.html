<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Generator</title>
  <link rel="icon" href="data:,">
  <style nonce="{{ request.state.csp_nonce }}">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f4f4f2;
      --surface:      #ffffff;
      --border:       #e4e4e7;
      --border-dark:  #18181b;
      --text:         #18181b;
      --text-muted:   #71717a;
      --text-faint:   #a1a1aa;
      --accent:       #18181b;
      --accent-fg:    #ffffff;
      --err-bg:       #fef2f2;
      --err-border:   #fecaca;
      --err-text:     #b91c1c;
      --ok-bg:        #f0fdf4;
      --ok-border:    #bbf7d0;
      --ok-text:      #15803d;
      --r:            5px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 64px 24px 48px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      width: 100%;
      max-width: 460px;
    }

    /* ── Header ── */
    .site-header {
      margin-bottom: 28px;
    }

    .site-header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .site-header p {
      margin-top: 3px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .card-body {
      padding: 24px;
    }

    /* ── URL input ── */
    .url-input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      outline: none;
      transition: border-color 150ms;
    }

    .url-input::placeholder { color: var(--text-faint); }
    .url-input:focus { border-color: var(--border-dark); }

    .btn-generate {
      width: 100%;
      height: 40px;
      margin-top: 12px;
      padding: 0 16px;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--accent-fg);
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--r);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 150ms;
    }

    .btn-generate:hover  { opacity: 0.82; }
    .btn-generate:active { opacity: 0.65; }

    /* ── Upload section ── */
    .upload-section {
      margin-top: 14px;
    }

    .field-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 7px;
    }

    .drop-zone {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 13px 14px;
      border: 1px dashed var(--border);
      border-radius: var(--r);
      cursor: pointer;
      transition: border-color 150ms, background 150ms;
      user-select: none;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--border-dark);
      background: #fafafa;
    }

    .drop-zone input[type="file"] { display: none; }

    .drop-zone-icon { flex-shrink: 0; color: var(--text-faint); }

    .drop-zone-hint {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .drop-zone-hint strong {
      color: var(--text);
      font-weight: 500;
    }

    .preview-row {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: #fafafa;
    }

    .preview-row.visible { display: flex; }

    .preview-thumb {
      width: 30px;
      height: 30px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      flex-shrink: 0;
    }

    .preview-name {
      flex: 1;
      font-size: 0.82rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-remove {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      border-radius: 50%;
      transition: color 150ms, background 150ms;
    }

    .btn-remove:hover {
      color: var(--err-text);
      background: var(--err-bg);
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      margin-top: 12px;
      padding: 9px 13px;
      background: var(--err-bg);
      border: 1px solid var(--err-border);
      border-radius: var(--r);
      color: var(--err-text);
      font-size: 0.82rem;
    }

    /* ── Result ── */
    .result {
      display: none;
    }

    .result.visible { display: block; }

    .result-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* QR display */
    .qr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 0 20px;
    }

    .qr-frame {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: #fff;
      line-height: 0;
    }

    .qr-frame img {
      width: 192px;
      height: 192px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 14px;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: color 150ms, border-color 150ms;
    }

    .btn-download:hover {
      color: var(--text);
      border-color: var(--border-dark);
    }

    /* URL fields */
    .url-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .url-field {}

    .url-value-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .url-value {
      flex: 1;
      padding: 8px 11px;
      font-size: 0.82rem;
      color: var(--text);
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-copy {
      flex-shrink: 0;
      height: 34px;
      padding: 0 13px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      white-space: nowrap;
      transition: color 150ms, border-color 150ms, background 150ms;
    }

    .btn-copy:hover { color: var(--text); border-color: var(--border-dark); }

    .btn-copy.copied {
      color: var(--ok-text);
      border-color: var(--ok-border);
      background: var(--ok-bg);
    }

    /* ── Customize ── */
    .customize-section {
      margin-top: 14px;
    }

    .customize-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .color-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .color-item-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .color-pick {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      background: none;
      flex-shrink: 0;
    }

    .color-pick::-webkit-color-swatch-wrapper { padding: 0; }
    .color-pick::-webkit-color-swatch { border: none; border-radius: 2px; }
    .color-pick::-moz-color-swatch { border: none; border-radius: 2px; }

    .dot-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .dot-opt {
      width: 34px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      transition: background 150ms, color 150ms;
    }

    .dot-opt + .dot-opt {
      border-left: 1px solid var(--border);
    }

    .dot-opt:hover { background: #f4f4f2; color: var(--text-muted); }

    .dot-opt.active {
      background: var(--accent);
      color: var(--accent-fg);
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="layout">

    <header class="site-header">
      <h1>QR Generator</h1>
      <p>URLからQRコードと短縮URLを生成します</p>
    </header>

    <div class="card">
      <div class="card-body">

        <form id="form">
          <input class="url-input" type="text" id="urlInput"
            placeholder="https://example.com"
            autocomplete="off" spellcheck="false" />

          <div class="upload-section">
            <span class="field-label">中央画像（任意）</span>
            <div class="drop-zone" id="logoDrop">
              <input type="file" id="logoFile" accept="image/png,image/jpeg,image/gif,image/webp" />
              <svg class="drop-zone-icon" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="1" y="1" width="13" height="13" rx="2"/>
                <circle cx="5" cy="5" r="1.2" fill="currentColor" stroke="none"/>
                <path d="M1 10.5l3.5-3.5 2.5 2.5 2-2 4 4"/>
              </svg>
              <span class="drop-zone-hint">
                <strong>クリックまたはドロップ</strong>して選択
                <br>PNG · JPEG · GIF · WebP（2 MB 以内）
              </span>
            </div>
            <div class="preview-row" id="logoPreview">
              <img class="preview-thumb" id="logoThumb" src="" alt="" />
              <span class="preview-name" id="logoName"></span>
              <button type="button" class="btn-remove" id="logoRemoveBtn" aria-label="削除">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
                  <path d="M1 1l8 8M9 1L1 9"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="customize-section">
            <span class="field-label">カスタマイズ</span>
            <div class="customize-row">
              <div class="color-group">
                <label class="color-item">
                  <span class="color-item-label">QR</span>
                  <input type="color" id="fillColor" value="#000000" class="color-pick">
                </label>
                <label class="color-item">
                  <span class="color-item-label">背景</span>
                  <input type="color" id="bgColor" value="#ffffff" class="color-pick">
                </label>
              </div>
              <div class="dot-toggle" role="group" aria-label="ドット形状">
                <button type="button" class="dot-opt active" id="dotSquare" title="四角" aria-pressed="true">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true">
                    <rect x="0" y="0" width="5" height="5"/>
                    <rect x="9" y="0" width="5" height="5"/>
                    <rect x="0" y="9" width="5" height="5"/>
                    <rect x="9" y="9" width="5" height="5"/>
                  </svg>
                </button>
                <button type="button" class="dot-opt" id="dotRound" title="丸" aria-pressed="false">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true">
                    <circle cx="2.5" cy="2.5" r="2.5"/>
                    <circle cx="11.5" cy="2.5" r="2.5"/>
                    <circle cx="2.5" cy="11.5" r="2.5"/>
                    <circle cx="11.5" cy="11.5" r="2.5"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <button class="btn-generate" type="submit">
            <span id="btnText">生成</span>
            <span class="spinner" id="spinner"></span>
          </button>
        </form>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result" id="result">
          <div class="result-divider"></div>

          <div class="qr-block">
            <div class="qr-frame">
              <img id="qrImg" src="" alt="QR Code" />
            </div>
            <a id="downloadBtn" class="btn-download" download="qrcode.png">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6.5 1v7.5M4 6l2.5 2.5L9 6"/>
                <path d="M1 9.5v1A1.5 1.5 0 002.5 12h8a1.5 1.5 0 001.5-1.5v-1"/>
              </svg>
              ダウンロード
            </a>
          </div>

          <div class="url-fields">
            <div class="url-field">
              <span class="field-label">短縮URL</span>
              <div class="url-value-row">
                <div class="url-value" id="shortUrl"></div>
                <button class="btn-copy" id="copyBtn">コピー</button>
              </div>
            </div>
            <div class="url-field">
              <span class="field-label">元のURL</span>
              <div class="url-value-row">
                <div class="url-value" id="originalUrl"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script nonce="{{ request.state.csp_nonce }}">
    const form        = document.getElementById("form");
    const urlInput    = document.getElementById("urlInput");
    const errorMsg    = document.getElementById("errorMsg");
    const result      = document.getElementById("result");
    const qrImg       = document.getElementById("qrImg");
    const shortUrlEl  = document.getElementById("shortUrl");
    const origUrlEl   = document.getElementById("originalUrl");
    const downloadBtn = document.getElementById("downloadBtn");
    const btnText     = document.getElementById("btnText");
    const spinner     = document.getElementById("spinner");
    const logoFile    = document.getElementById("logoFile");
    const logoDrop    = document.getElementById("logoDrop");
    const logoPreview = document.getElementById("logoPreview");
    const logoThumb   = document.getElementById("logoThumb");
    const logoName    = document.getElementById("logoName");

    logoDrop.addEventListener("click", () => logoFile.click());
    document.getElementById("logoRemoveBtn").addEventListener("click", removeLogo);
    document.getElementById("copyBtn").addEventListener("click", copyShort);

    let dotStyle = "square";
    document.getElementById("dotSquare").addEventListener("click", () => {
      dotStyle = "square";
      document.getElementById("dotSquare").classList.add("active");
      document.getElementById("dotSquare").setAttribute("aria-pressed", "true");
      document.getElementById("dotRound").classList.remove("active");
      document.getElementById("dotRound").setAttribute("aria-pressed", "false");
    });
    document.getElementById("dotRound").addEventListener("click", () => {
      dotStyle = "round";
      document.getElementById("dotRound").classList.add("active");
      document.getElementById("dotRound").setAttribute("aria-pressed", "true");
      document.getElementById("dotSquare").classList.remove("active");
      document.getElementById("dotSquare").setAttribute("aria-pressed", "false");
    });

    logoFile.addEventListener("change", () => {
      if (logoFile.files[0]) showLogoPreview(logoFile.files[0]);
    });

    logoDrop.addEventListener("dragover", (e) => {
      e.preventDefault();
      logoDrop.classList.add("dragover");
    });
    logoDrop.addEventListener("dragleave", () => logoDrop.classList.remove("dragover"));
    logoDrop.addEventListener("drop", (e) => {
      e.preventDefault();
      logoDrop.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        const dt = new DataTransfer();
        dt.items.add(file);
        logoFile.files = dt.files;
        showLogoPreview(file);
      }
    });

    function showLogoPreview(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        logoThumb.src = e.target.result;
        logoName.textContent = file.name;
        logoDrop.style.display = "none";
        logoPreview.classList.add("visible");
      };
      reader.readAsDataURL(file);
    }

    function removeLogo() {
      logoFile.value = "";
      logoThumb.src = "";
      logoName.textContent = "";
      logoPreview.classList.remove("visible");
      logoDrop.style.display = "flex";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      errorMsg.style.display = "none";
      result.classList.remove("visible");
      btnText.style.display = "none";
      spinner.style.display = "block";

      try {
        const fd = new FormData();
        fd.append("url", url);
        if (logoFile.files[0]) fd.append("logo", logoFile.files[0]);
        fd.append("fill_color", document.getElementById("fillColor").value);
        fd.append("back_color", document.getElementById("bgColor").value);
        fd.append("dot_style", dotStyle);

        const basePath = window.location.pathname.endsWith("/")
          ? window.location.pathname
          : window.location.pathname + "/";
        const res  = await fetch(basePath + "shorten", { method: "POST", body: fd });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "エラーが発生しました");

        const dataUrl = "data:image/png;base64," + data.qr_base64;
        qrImg.src        = dataUrl;
        shortUrlEl.textContent = data.short_url;
        origUrlEl.textContent  = data.original_url;
        downloadBtn.href = dataUrl;
        result.classList.add("visible");

        const copyBtn = document.getElementById("copyBtn");
        copyBtn.classList.remove("copied");
        copyBtn.textContent = "コピー";
      } catch (err) {
        errorMsg.textContent    = err.message;
        errorMsg.style.display  = "block";
      } finally {
        btnText.style.display  = "inline";
        spinner.style.display  = "none";
      }
    });

    async function copyShort() {
      await navigator.clipboard.writeText(shortUrlEl.textContent);
      const btn = document.getElementById("copyBtn");
      btn.textContent = "コピー済み";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "コピー";
        btn.classList.remove("copied");
      }, 2000);
    }
  </script>
</body>
</html>
