<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRShort</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#18181b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="QRShort">
  <style nonce="{{ request.state.csp_nonce }}">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f4f2;
      --surface:     #ffffff;
      --border:      #e4e4e7;
      --border-dark: #18181b;
      --text:        #18181b;
      --text-muted:  #71717a;
      --text-faint:  #a1a1aa;
      --accent:      #18181b;
      --accent-fg:   #ffffff;
      --err-bg:      #fef2f2;
      --err-border:  #fecaca;
      --err-text:    #b91c1c;
      --ok-bg:       #f0fdf4;
      --ok-border:   #bbf7d0;
      --ok-text:     #15803d;
      --r:           5px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 64px 24px 48px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .layout { width: 100%; max-width: 460px; }

    /* ── Header ── */
    .site-header { margin-bottom: 28px; }

    .site-header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .site-header p {
      margin-top: 3px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }

    .card-body { padding: 24px; }

    /* ── URL input ── */
    .url-input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      outline: none;
      transition: border-color 150ms;
    }

    .url-input::placeholder { color: var(--text-faint); }
    .url-input:focus { border-color: var(--border-dark); }

    /* ── Section label ── */
    .field-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    /* ── Upload ── */
    .upload-section { margin-top: 16px; }

    .drop-zone {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 13px 14px;
      border: 1px dashed var(--border);
      border-radius: var(--r);
      cursor: pointer;
      transition: border-color 150ms, background 150ms;
      user-select: none;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--border-dark);
      background: #fafafa;
    }

    .drop-zone input[type="file"] { display: none; }
    .drop-zone-icon { flex-shrink: 0; color: var(--text-faint); }

    .drop-zone-hint { font-size: 0.82rem; color: var(--text-muted); line-height: 1.4; }
    .drop-zone-hint strong { color: var(--text); font-weight: 500; }

    .preview-row {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: #fafafa;
    }

    .preview-row.visible { display: flex; }

    .preview-thumb {
      width: 30px;
      height: 30px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      flex-shrink: 0;
    }

    .preview-name {
      flex: 1;
      font-size: 0.82rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-remove {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      border-radius: 50%;
      transition: color 150ms, background 150ms;
    }

    .btn-remove:hover { color: var(--err-text); background: var(--err-bg); }

    /* ── Customize ── */
    .customize-section { margin-top: 16px; }

    /* Color swatches */
    .color-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .color-row  { display: flex; align-items: flex-start; gap: 10px; }
    .color-row-label {
      font-size: 0.75rem; color: var(--text-muted);
      width: 22px; flex-shrink: 0; padding-top: 3px;
    }

    .swatch-group {
      display: grid;
      grid-template-columns: repeat(8, 22px);
      gap: 6px;
    }
    .swatch-group.hidden { display: none; }

    .swatch {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid transparent;
      cursor: pointer; flex-shrink: 0; padding: 0;
      transition: transform 100ms; outline-offset: 2px;
    }
    .swatch-light { border-color: var(--border); }
    .swatch.selected { outline: 2px solid var(--border-dark); }
    .swatch:hover:not(.selected) { transform: scale(1.15); }

    /* Dark QR colors (on light background) */
    .c-black   { background: #000000; }
    .c-slate   { background: #1e293b; }
    .c-gray    { background: #374151; }
    .c-navy    { background: #1e3a8a; }
    .c-indigo  { background: #312e81; }
    .c-ocean   { background: #0e7490; }
    .c-teal    { background: #0f766e; }
    .c-forest  { background: #14532d; }
    .c-emerald { background: #065f46; }
    .c-rust    { background: #7c2d12; }
    .c-amber   { background: #92400e; }
    .c-brown   { background: #78350f; }
    .c-purple  { background: #4c1d95; }
    .c-magenta { background: #86198f; }
    .c-crimson { background: #881337; }
    .c-rose    { background: #9d174d; }

    /* Light QR colors (on dark background) */
    .lc-white    { background: #ffffff; }
    .lc-lgray    { background: #e2e8f0; }
    .lc-yellow   { background: #fef08a; }
    .lc-gold     { background: #fcd34d; }
    .lc-orange   { background: #fdba74; }
    .lc-coral    { background: #fca5a5; }
    .lc-rose     { background: #fda4af; }
    .lc-pink     { background: #f9a8d4; }
    .lc-fuchsia  { background: #f0abfc; }
    .lc-lavender { background: #c4b5fd; }
    .lc-sky      { background: #bae6fd; }
    .lc-cyan     { background: #67e8f9; }
    .lc-teal     { background: #5eead4; }
    .lc-mint     { background: #86efac; }
    .lc-lime     { background: #bef264; }
    .lc-green    { background: #bbf7d0; }

    /* Background colors */
    .bg-white    { background: #ffffff; }
    .bg-black    { background: #000000; }
    .bg-charcoal { background: #111827; }
    .bg-dnavy   { background: #0f172a; }
    .bg-dslate   { background: #1e293b; }
    .bg-dforest  { background: #052e16; }
    .bg-dpurple  { background: #1e1b4b; }
    .bg-dteal    { background: #042f2e; }

    /* Dot style cards */
    .dot-toggle { display: flex; gap: 8px; }

    .dot-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 14px 12px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      color: var(--text-faint);
      transition: border-color 150ms, color 150ms, background 150ms;
      font-family: inherit;
    }

    .dot-card:hover { border-color: var(--text-muted); color: var(--text-muted); }

    .dot-card.active {
      border: 2px solid var(--border-dark);
      color: var(--text);
      background: #fafafa;
    }

    .dot-preview { width: 44px; height: 44px; }

    .dot-card-label {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* ── Generate button ── */
    .btn-generate {
      width: 100%;
      height: 40px;
      margin-top: 14px;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--accent-fg);
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--r);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 150ms;
    }

    .btn-generate:hover  { opacity: 0.82; }
    .btn-generate:active { opacity: 0.65; }

    /* ── Error ── */
    .error-msg {
      display: none;
      margin-top: 12px;
      padding: 9px 13px;
      background: var(--err-bg);
      border: 1px solid var(--err-border);
      border-radius: var(--r);
      color: var(--err-text);
      font-size: 0.82rem;
    }

    /* ── Result ── */
    .result { display: none; }
    .result.visible { display: block; }

    .result-divider { height: 1px; background: var(--border); margin: 20px 0; }

    .qr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 0;
    }

    .qr-frame {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: #fff;
      line-height: 0;
    }

    .qr-frame img {
      width: 192px;
      height: 192px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 14px;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: color 150ms, border-color 150ms;
    }

    .btn-download:hover { color: var(--text); border-color: var(--border-dark); }

    .url-fields { display: flex; flex-direction: column; gap: 12px; }

    .url-value-row { display: flex; align-items: center; gap: 7px; }

    .url-value {
      flex: 1;
      padding: 8px 11px;
      font-size: 0.82rem;
      color: var(--text);
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-copy {
      flex-shrink: 0;
      height: 34px;
      padding: 0 13px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      white-space: nowrap;
      transition: color 150ms, border-color 150ms, background 150ms;
    }

    .btn-copy:hover { color: var(--text); border-color: var(--border-dark); }
    .btn-copy.copied { color: var(--ok-text); border-color: var(--ok-border); background: var(--ok-bg); }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="layout">

    <header class="site-header">
      <h1>QRShort</h1>
      <p>URLからQRコードと短縮URLを生成します</p>
    </header>

    <div class="card">
      <div class="card-body">

        <form id="form">
          <input class="url-input" type="text" id="urlInput"
            placeholder="https://example.com"
            autocomplete="off" spellcheck="false" />

          <div class="upload-section">
            <span class="field-label">中央画像（任意）</span>
            <div class="drop-zone" id="logoDrop">
              <input type="file" id="logoFile" accept="image/png,image/jpeg,image/gif,image/webp" />
              <svg class="drop-zone-icon" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="1" y="1" width="13" height="13" rx="2"/>
                <circle cx="5" cy="5" r="1.2" fill="currentColor" stroke="none"/>
                <path d="M1 10.5l3.5-3.5 2.5 2.5 2-2 4 4"/>
              </svg>
              <span class="drop-zone-hint">
                <strong>クリックまたはドロップ</strong>して選択
                <br>PNG · JPEG · GIF · WebP（2 MB 以内）
              </span>
            </div>
            <div class="preview-row" id="logoPreview">
              <img class="preview-thumb" id="logoThumb" src="" alt="" />
              <span class="preview-name" id="logoName"></span>
              <button type="button" class="btn-remove" id="logoRemoveBtn" aria-label="削除">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
                  <path d="M1 1l8 8M9 1L1 9"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="customize-section">
            <span class="field-label">カスタマイズ</span>

            <div class="color-rows">
              <div class="color-row">
                <span class="color-row-label">QR</span>
                <div>
                  <div class="swatch-group" id="qrSwatchesDark" role="radiogroup" aria-label="QRコードの色（暗色）">
                    <button type="button" class="swatch c-black selected"  data-color="#000000" title="ブラック"    aria-checked="true"></button>
                    <button type="button" class="swatch c-slate"           data-color="#1e293b" title="スレート"    aria-checked="false"></button>
                    <button type="button" class="swatch c-gray"            data-color="#374151" title="グレー"      aria-checked="false"></button>
                    <button type="button" class="swatch c-navy"            data-color="#1e3a8a" title="ネイビー"    aria-checked="false"></button>
                    <button type="button" class="swatch c-indigo"          data-color="#312e81" title="インディゴ"  aria-checked="false"></button>
                    <button type="button" class="swatch c-ocean"           data-color="#0e7490" title="オーシャン"  aria-checked="false"></button>
                    <button type="button" class="swatch c-teal"            data-color="#0f766e" title="ティール"    aria-checked="false"></button>
                    <button type="button" class="swatch c-forest"          data-color="#14532d" title="フォレスト"  aria-checked="false"></button>
                    <button type="button" class="swatch c-emerald"         data-color="#065f46" title="エメラルド"  aria-checked="false"></button>
                    <button type="button" class="swatch c-rust"            data-color="#7c2d12" title="テラコッタ"  aria-checked="false"></button>
                    <button type="button" class="swatch c-amber"           data-color="#92400e" title="アンバー"    aria-checked="false"></button>
                    <button type="button" class="swatch c-brown"           data-color="#78350f" title="ブラウン"    aria-checked="false"></button>
                    <button type="button" class="swatch c-purple"          data-color="#4c1d95" title="パープル"    aria-checked="false"></button>
                    <button type="button" class="swatch c-magenta"         data-color="#86198f" title="マゼンタ"    aria-checked="false"></button>
                    <button type="button" class="swatch c-crimson"         data-color="#881337" title="クリムゾン"  aria-checked="false"></button>
                    <button type="button" class="swatch c-rose"            data-color="#9d174d" title="ローズ"      aria-checked="false"></button>
                  </div>
                  <div class="swatch-group hidden" id="qrSwatchesLight" role="radiogroup" aria-label="QRコードの色（明色）">
                    <button type="button" class="swatch lc-white swatch-light selected" data-color="#ffffff" title="ホワイト"   aria-checked="true"></button>
                    <button type="button" class="swatch lc-lgray swatch-light"          data-color="#e2e8f0" title="シルバー"   aria-checked="false"></button>
                    <button type="button" class="swatch lc-yellow swatch-light"         data-color="#fef08a" title="イエロー"   aria-checked="false"></button>
                    <button type="button" class="swatch lc-gold swatch-light"           data-color="#fcd34d" title="ゴールド"   aria-checked="false"></button>
                    <button type="button" class="swatch lc-orange swatch-light"         data-color="#fdba74" title="オレンジ"   aria-checked="false"></button>
                    <button type="button" class="swatch lc-coral swatch-light"          data-color="#fca5a5" title="コーラル"   aria-checked="false"></button>
                    <button type="button" class="swatch lc-rose swatch-light"           data-color="#fda4af" title="ローズ"     aria-checked="false"></button>
                    <button type="button" class="swatch lc-pink swatch-light"           data-color="#f9a8d4" title="ピンク"     aria-checked="false"></button>
                    <button type="button" class="swatch lc-fuchsia swatch-light"        data-color="#f0abfc" title="フューシャ" aria-checked="false"></button>
                    <button type="button" class="swatch lc-lavender swatch-light"       data-color="#c4b5fd" title="ラベンダー" aria-checked="false"></button>
                    <button type="button" class="swatch lc-sky swatch-light"            data-color="#bae6fd" title="スカイ"     aria-checked="false"></button>
                    <button type="button" class="swatch lc-cyan swatch-light"           data-color="#67e8f9" title="シアン"     aria-checked="false"></button>
                    <button type="button" class="swatch lc-teal swatch-light"           data-color="#5eead4" title="ティール"   aria-checked="false"></button>
                    <button type="button" class="swatch lc-mint swatch-light"           data-color="#86efac" title="ミント"     aria-checked="false"></button>
                    <button type="button" class="swatch lc-lime swatch-light"           data-color="#bef264" title="ライム"     aria-checked="false"></button>
                    <button type="button" class="swatch lc-green swatch-light"          data-color="#bbf7d0" title="グリーン"   aria-checked="false"></button>
                  </div>
                </div>
              </div>
              <div class="color-row">
                <span class="color-row-label">背景</span>
                <div class="swatch-group" id="bgSwatches" role="radiogroup" aria-label="背景色">
                  <button type="button" class="swatch bg-white swatch-light selected" data-color="#ffffff" data-mode="light" title="ホワイト" aria-checked="true"></button>
                  <button type="button" class="swatch bg-black"                        data-color="#000000" data-mode="dark"  title="ブラック" aria-checked="false"></button>
                </div>
              </div>
            </div>

            <div class="dot-toggle" role="group" aria-label="ドット形状">
              <button type="button" class="dot-card active" id="dotSquare" aria-pressed="true">
                <svg class="dot-preview" viewBox="0 0 44 44" fill="currentColor" aria-hidden="true">
                  <rect x="0"  y="0"  width="9" height="9"/><rect x="11" y="0"  width="9" height="9"/><rect x="22" y="0"  width="9" height="9"/><rect x="33" y="0"  width="9" height="9"/>
                  <rect x="0"  y="11" width="9" height="9"/><rect x="11" y="11" width="9" height="9"/><rect x="22" y="11" width="9" height="9"/><rect x="33" y="11" width="9" height="9"/>
                  <rect x="0"  y="22" width="9" height="9"/><rect x="11" y="22" width="9" height="9"/><rect x="22" y="22" width="9" height="9"/><rect x="33" y="22" width="9" height="9"/>
                  <rect x="0"  y="33" width="9" height="9"/><rect x="11" y="33" width="9" height="9"/><rect x="22" y="33" width="9" height="9"/><rect x="33" y="33" width="9" height="9"/>
                </svg>
                <span class="dot-card-label">四角</span>
              </button>
              <button type="button" class="dot-card" id="dotRound" aria-pressed="false">
                <svg class="dot-preview" viewBox="0 0 44 44" fill="currentColor" aria-hidden="true">
                  <circle cx="4.5"  cy="4.5"  r="4.5"/><circle cx="15.5" cy="4.5"  r="4.5"/><circle cx="26.5" cy="4.5"  r="4.5"/><circle cx="37.5" cy="4.5"  r="4.5"/>
                  <circle cx="4.5"  cy="15.5" r="4.5"/><circle cx="15.5" cy="15.5" r="4.5"/><circle cx="26.5" cy="15.5" r="4.5"/><circle cx="37.5" cy="15.5" r="4.5"/>
                  <circle cx="4.5"  cy="26.5" r="4.5"/><circle cx="15.5" cy="26.5" r="4.5"/><circle cx="26.5" cy="26.5" r="4.5"/><circle cx="37.5" cy="26.5" r="4.5"/>
                  <circle cx="4.5"  cy="37.5" r="4.5"/><circle cx="15.5" cy="37.5" r="4.5"/><circle cx="26.5" cy="37.5" r="4.5"/><circle cx="37.5" cy="37.5" r="4.5"/>
                </svg>
                <span class="dot-card-label">丸</span>
              </button>
            </div>
          </div>

          <button class="btn-generate" type="submit">
            <span id="btnText">生成</span>
            <span class="spinner" id="spinner"></span>
          </button>
        </form>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result" id="result">
          <div class="result-divider"></div>

          <div class="qr-block">
            <div class="qr-frame">
              <img id="qrImg" src="" alt="QR Code" />
            </div>
            <a id="downloadBtn" class="btn-download" download="qrcode.png">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6.5 1v7.5M4 6l2.5 2.5L9 6"/>
                <path d="M1 9.5v1A1.5 1.5 0 002.5 12h8a1.5 1.5 0 001.5-1.5v-1"/>
              </svg>
              ダウンロード
            </a>
          </div>

          <div class="url-fields">
            <div class="url-field">
              <span class="field-label">短縮URL</span>
              <div class="url-value-row">
                <div class="url-value" id="shortUrl"></div>
                <button class="btn-copy" id="copyBtn">コピー</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script nonce="{{ request.state.csp_nonce }}">
    const form        = document.getElementById("form");
    const urlInput    = document.getElementById("urlInput");
    const errorMsg    = document.getElementById("errorMsg");
    const result      = document.getElementById("result");
    const qrImg       = document.getElementById("qrImg");
    const shortUrlEl  = document.getElementById("shortUrl");
    const downloadBtn = document.getElementById("downloadBtn");
    const btnText     = document.getElementById("btnText");
    const spinner     = document.getElementById("spinner");
    const logoFile    = document.getElementById("logoFile");
    const logoDrop    = document.getElementById("logoDrop");
    const logoPreview = document.getElementById("logoPreview");
    const logoThumb   = document.getElementById("logoThumb");
    const logoName    = document.getElementById("logoName");

    // ── Logo upload ──
    logoDrop.addEventListener("click", () => logoFile.click());
    document.getElementById("logoRemoveBtn").addEventListener("click", removeLogo);

    logoFile.addEventListener("change", () => {
      if (logoFile.files[0]) showLogoPreview(logoFile.files[0]);
    });

    logoDrop.addEventListener("dragover", (e) => { e.preventDefault(); logoDrop.classList.add("dragover"); });
    logoDrop.addEventListener("dragleave", () => logoDrop.classList.remove("dragover"));
    logoDrop.addEventListener("drop", (e) => {
      e.preventDefault();
      logoDrop.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        const dt = new DataTransfer();
        dt.items.add(file);
        logoFile.files = dt.files;
        showLogoPreview(file);
      }
    });

    function showLogoPreview(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        logoThumb.src = e.target.result;
        logoName.textContent = file.name;
        logoDrop.style.display = "none";
        logoPreview.classList.add("visible");
      };
      reader.readAsDataURL(file);
    }

    function removeLogo() {
      logoFile.value = "";
      logoThumb.src = "";
      logoName.textContent = "";
      logoPreview.classList.remove("visible");
      logoDrop.style.display = "flex";
    }

    // ── Color swatches ──
    let fillColor = "#000000";
    let backColor = "#ffffff";

    function bindSwatchGroup(groupId, onChange) {
      document.querySelectorAll("#" + groupId + " .swatch").forEach(el => {
        el.addEventListener("click", () => {
          document.querySelectorAll("#" + groupId + " .swatch").forEach(s => {
            s.classList.remove("selected"); s.setAttribute("aria-checked", "false");
          });
          el.classList.add("selected");
          el.setAttribute("aria-checked", "true");
          onChange(el.dataset.color);
        });
      });
    }

    bindSwatchGroup("qrSwatchesDark",  (c) => { fillColor = c; });
    bindSwatchGroup("qrSwatchesLight", (c) => { fillColor = c; });

    bindSwatchGroup("bgSwatches", (c) => {
      backColor = c;
      const isDark = document.querySelector("#bgSwatches .swatch.selected").dataset.mode === "dark";
      const showId = isDark ? "qrSwatchesLight" : "qrSwatchesDark";
      const hideId = isDark ? "qrSwatchesDark"  : "qrSwatchesLight";
      document.getElementById(showId).classList.remove("hidden");
      document.getElementById(hideId).classList.add("hidden");
      // reset QR color to first swatch of active group
      const first = document.querySelector("#" + showId + " .swatch");
      document.querySelectorAll("#" + showId + " .swatch").forEach(s => {
        s.classList.remove("selected"); s.setAttribute("aria-checked", "false");
      });
      first.classList.add("selected"); first.setAttribute("aria-checked", "true");
      fillColor = first.dataset.color;
    });

    // ── Dot style ──
    let dotStyle = "square";
    const dotSquareBtn = document.getElementById("dotSquare");
    const dotRoundBtn  = document.getElementById("dotRound");

    dotSquareBtn.addEventListener("click", () => {
      dotStyle = "square";
      dotSquareBtn.classList.add("active");    dotSquareBtn.setAttribute("aria-pressed", "true");
      dotRoundBtn.classList.remove("active");  dotRoundBtn.setAttribute("aria-pressed", "false");
    });

    dotRoundBtn.addEventListener("click", () => {
      dotStyle = "round";
      dotRoundBtn.classList.add("active");     dotRoundBtn.setAttribute("aria-pressed", "true");
      dotSquareBtn.classList.remove("active"); dotSquareBtn.setAttribute("aria-pressed", "false");
    });

    // ── Copy ──
    document.getElementById("copyBtn").addEventListener("click", copyShort);

    // ── Submit ──
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      errorMsg.style.display = "none";
      result.classList.remove("visible");
      btnText.style.display = "none";
      spinner.style.display = "block";

      try {
        const fd = new FormData();
        fd.append("url", url);
        if (logoFile.files[0]) fd.append("logo", logoFile.files[0]);
        fd.append("fill_color", fillColor);
        fd.append("back_color", backColor);
        fd.append("dot_style", dotStyle);

        const basePath = window.location.pathname.endsWith("/")
          ? window.location.pathname
          : window.location.pathname + "/";
        const res  = await fetch(basePath + "shorten", { method: "POST", body: fd });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "エラーが発生しました");

        const dataUrl = "data:image/png;base64," + data.qr_base64;
        qrImg.src              = dataUrl;
        shortUrlEl.textContent = data.short_url;
        downloadBtn.href       = dataUrl;
        result.classList.add("visible");

        const copyBtn = document.getElementById("copyBtn");
        copyBtn.classList.remove("copied");
        copyBtn.textContent = "コピー";
      } catch (err) {
        errorMsg.textContent   = err.message;
        errorMsg.style.display = "block";
      } finally {
        btnText.style.display = "inline";
        spinner.style.display = "none";
      }
    });

    async function copyShort() {
      await navigator.clipboard.writeText(shortUrlEl.textContent);
      const btn = document.getElementById("copyBtn");
      btn.textContent = "コピー済み";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "コピー"; btn.classList.remove("copied"); }, 2000);
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
