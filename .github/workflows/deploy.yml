name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Rollback stack if stuck in failed state
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name jawsqr \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: $STATUS"
          if [[ "$STATUS" == "UPDATE_FAILED" || "$STATUS" == "UPDATE_ROLLBACK_FAILED" ]]; then
            aws cloudformation rollback-stack --stack-name jawsqr
            aws cloudformation wait stack-rollback-complete --stack-name jawsqr
          fi

      - run: sam build

      - run: sam deploy --no-confirm-changeset
