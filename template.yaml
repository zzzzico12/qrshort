AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: QR Code & URL Shortener

Parameters:
  BaseUrl:
    Type: String
    Default: ""
  DomainName:
    Type: String
    Default: "zzzzico.click"
  HostedZoneId:
    Type: String
    Default: "Z0179539GWUAV7DDCP3G"

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref UrlTable
        BASE_URL: !Ref BaseUrl
  Api:
    BinaryMediaTypes:
      - "multipart/form-data"
      - "image/png"
    MethodSettings:
      - ResourcePath: "/*"
        HttpMethod: "*"
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

Resources:
  AppFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: main.handler
      Runtime: python3.11
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UrlTable
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: GET
        Shorten:
          Type: Api
          Properties:
            Path: /shorten
            Method: POST
        Redirect:
          Type: Api
          Properties:
            Path: /r/{code}
            Method: GET
        Manifest:
          Type: Api
          Properties:
            Path: /manifest.json
            Method: GET
        ServiceWorker:
          Type: Api
          Properties:
            Path: /sw.js
            Method: GET
        AppIcon:
          Type: Api
          Properties:
            Path: /icon.svg
            Method: GET
        AppIcon192:
          Type: Api
          Properties:
            Path: /icon-192.png
            Method: GET
        AppIcon512:
          Type: Api
          Properties:
            Path: /icon-512.png
            Method: GET

  UrlTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: jawsqr-urls
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: code
          AttributeType: S
        - AttributeName: original_url
          AttributeType: S
      KeySchema:
        - AttributeName: code
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      GlobalSecondaryIndexes:
        - IndexName: original_url-index
          KeySchema:
            - AttributeName: original_url
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref Certificate
      EndpointConfiguration:
        Types:
          - REGIONAL

  BasePathMappingQr:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: ServerlessRestApiProdStage
    Properties:
      BasePath: qr
      DomainName: !Ref CustomDomain
      RestApiId: !Ref ServerlessRestApi
      Stage: Prod

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt CustomDomain.RegionalHostedZoneId

Outputs:
  ApiUrl:
    Description: "API Gateway URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  CustomDomainUrl:
    Description: "Custom Domain URL"
    Value: !Sub "https://${DomainName}"
